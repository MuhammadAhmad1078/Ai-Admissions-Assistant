<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AI Student Admissions Assistant — Chat with our counselor to find the perfect learning program for you." />
  <title>Admissions Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Tokens ───────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-app:      #0b0c16;
      --bg-panel:    rgba(26, 29, 46, 0.82);
      --bg-bubble-ai:rgba(36, 40, 64, 0.9);
      --bg-bubble-u: #6c5ce7;
      --text-primary:#e8eaf6;
      --text-dim:    #9599b3;
      --accent:      #6c5ce7;
      --accent-glow: rgba(108, 92, 231, .35);
      --success:     #00cec9;
      --radius:      16px;
      --font:        'Inter', system-ui, sans-serif;
    }

    html, body { height: 100%; width: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg-app);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow circles in the background */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      z-index: -1;
      animation: drift 20s infinite alternate ease-in-out;
      pointer-events: none;
    }

    body::before {
      background: var(--accent);
      top: -120px;
      left: -120px;
    }

    body::after {
      background: var(--success);
      bottom: -120px;
      right: -120px;
      animation-delay: -6s;
    }

    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 40px) scale(1.15); }
    }

    /* ── Outer shell ──────────────────────────────────── */
    #app {
      width: 100%;
      max-width: 520px;
      height: 100vh;
      max-height: 780px;
      display: flex;
      flex-direction: column;
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 30px 80px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.08);
      position: relative;
    }

    /* ── Header ───────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 22px 24px;
      background: linear-gradient(135deg, rgba(36, 40, 64, 0.4) 0%, rgba(26, 29, 46, 0.4) 100%);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }

    #header .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    #header .info h1 {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.3;
    }

    #header .info p {
      font-size: 12px;
      color: var(--success);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    #header .info p::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%      { opacity: .4; }
    }

    /* ── Chat area ────────────────────────────────────── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #chat-area::-webkit-scrollbar { width: 5px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 10px; }

    /* ── Bubbles ──────────────────────────────────────── */
    .msg {
      max-width: 82%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      animation: msg-in .3s ease-out;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.ai {
      align-self: flex-start;
      background: var(--bg-bubble-ai);
      border: 1px solid rgba(255,255,255,.03);
      border-bottom-left-radius: 4px;
      color: var(--text-primary);
    }

    .msg.user {
      align-self: flex-end;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .msg.system {
      align-self: center;
      background: linear-gradient(135deg, rgba(0,206,201,.15), rgba(108,92,231,.15));
      border: 1px solid rgba(0,206,201,.2);
      border-radius: 12px;
      max-width: 92%;
      text-align: center;
      font-size: 13px;
      color: var(--success);
    }

    /* ── Quick replies ────────────────────────────────── */
    .quick-replies-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
      margin-bottom: 4px;
      align-self: flex-start;
      max-width: 92%;
      animation: msg-in .3s ease-out;
    }

    .quick-reply-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      padding: 8px 14px;
      border-radius: 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: var(--font);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .quick-reply-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px var(--accent-glow);
      color: #fff;
    }

    .quick-reply-btn:active {
      transform: translateY(0);
    }

    /* ── Typing indicator ─────────────────────────────── */
    .typing-indicator {
      align-self: flex-start;
      display: flex;
      gap: 5px;
      padding: 14px 18px;
      background: var(--bg-bubble-ai);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      animation: msg-in .3s ease-out;
    }

    .typing-indicator span {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      animation: bounce-dot 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: .2s; }
    .typing-indicator span:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce-dot {
      0%, 80%, 100% { transform: scale(.6); opacity: .4; }
      40%           { transform: scale(1);  opacity: 1; }
    }

    /* ── Input bar ────────────────────────────────────── */
    #input-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      background: rgba(26, 29, 46, 0.4);
      border-top: 1px solid rgba(255,255,255,.06);
    }

    #msg-input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 12px 18px;
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: all .25s ease;
      resize: none;
      max-height: 100px;
      line-height: 1.5;
    }

    #msg-input::placeholder { color: var(--text-dim); }
    #msg-input:focus {
      background: rgba(255, 255, 255, 0.07);
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-glow);
    }

    #send-btn {
      width: 44px; height: 44px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, box-shadow .2s;
      flex-shrink: 0;
    }

    #send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    #send-btn:active { transform: scale(.95); }

    #send-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Roadmap card (shown on lead_complete) ─────────── */
    .roadmap-card {
      background: linear-gradient(135deg, rgba(108,92,231,.1), rgba(0,206,201,.1));
      border: 1px solid rgba(108,92,231,.2);
      border-radius: 16px;
      padding: 20px;
      margin-top: 4px;
      align-self: flex-start;
      max-width: 92%;
      animation: msg-in .4s ease-out;
    }

    .roadmap-card h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .roadmap-card pre {
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--text-primary);
    }

    /* ── Responsive ───────────────────────────────────── */
    @media (max-width: 540px) {
      #app {
        max-width: 100%;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

<div id="app">
  <!-- Header -->
  <div id="header">
    <div class="avatar">🎓</div>
    <div class="info">
      <h1>Admissions Assistant</h1>
      <p>Online</p>
    </div>
  </div>

  <!-- Chat area -->
  <div id="chat-area">
    <!-- Welcome message injected by JS -->
  </div>

  <!-- Input bar -->
  <div id="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Type your message…" autocomplete="off"></textarea>
    <button id="send-btn" title="Send">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  // ── Config ────────────────────────────────────────────
  const API_URL = "/chat"; // served from same origin
  const sessionId = "sess_" + Math.random().toString(36).slice(2, 10);

  // ── DOM refs ──────────────────────────────────────────
  const chatArea  = document.getElementById("chat-area");
  const msgInput  = document.getElementById("msg-input");
  const sendBtn   = document.getElementById("send-btn");

  let isSending = false;
  let conversationDone = false;

  // ── Boot: welcome message ─────────────────────────────
  window.addEventListener("DOMContentLoaded", () => {
    addBubble(
      "ai",
      "Hey there! 👋 Welcome to our learning center.\n\nI'm your admissions counselor — I'm here to help you find the perfect program. What are you interested in learning?"
    );
    showQuickReplies([
      { text: "AI & Automation 🤖", value: "AI & Automation" },
      { text: "Web Development 💻", value: "Web Development" },
      { text: "Social Media Marketing 📈", value: "Social Media Marketing" },
      { text: "Graphic Design 🎨", value: "Graphic Design" },
      { text: "AI seekhni hai (Roman Urdu) 🇵🇰", value: "Mujhe AI aur Automation seekhni hai." }
    ]);
    msgInput.focus();
  });

  // ── Send handler ──────────────────────────────────────
  sendBtn.addEventListener("click", () => sendMessage());
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-grow textarea
  msgInput.addEventListener("input", () => {
    msgInput.style.height = "auto";
    msgInput.style.height = Math.min(msgInput.scrollHeight, 100) + "px";
  });

  async function sendMessage(customText) {
    const text = (typeof customText === "string") ? customText.trim() : msgInput.value.trim();
    if (!text || isSending || conversationDone) return;

    // Remove any active quick replies immediately
    const existingReplies = document.querySelector(".quick-replies-container");
    if (existingReplies) {
      existingReplies.remove();
    }

    // Show user bubble
    addBubble("user", text);
    msgInput.value = "";
    msgInput.style.height = "auto";

    // Lock UI
    isSending = true;
    sendBtn.disabled = true;

    // Show typing indicator
    const typingEl = showTyping();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ sessionId, message: text }),
      });

      const data = await res.json();

      // Remove typing indicator
      typingEl.remove();

      if (data.type === "lead_complete") {
        // Show success message
        addBubble("system", "✅ Your profile has been saved and a WhatsApp summary has been sent!");

        // Show the reply text
        addBubble("ai", data.reply.split("\n\n").slice(0, 2).join("\n\n"));

        // Show the roadmap as a special card
        if (data.lead && data.lead.course_recommendation) {
          showRoadmapCard(data.lead.course_recommendation);
        }

        conversationDone = true;
        msgInput.placeholder = "Conversation complete ✓";
        msgInput.disabled = true;
        sendBtn.disabled = true;
      } else if (data.type === "error") {
        addBubble("ai", data.reply);
      } else {
        addBubble("ai", data.reply);
      }
    } catch (err) {
      typingEl.remove();
      addBubble("ai", "Sorry, I couldn't connect to the server. Please make sure it's running and try again.");
      console.error("Fetch error:", err);
    }

    isSending = false;
    if (!conversationDone) {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }

  // ── Helpers ───────────────────────────────────────────
  function addBubble(type, text) {
    const div = document.createElement("div");
    div.className = `msg ${type}`;
    div.textContent = text;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showQuickReplies(options) {
    const existingReplies = document.querySelector(".quick-replies-container");
    if (existingReplies) {
      existingReplies.remove();
    }

    const container = document.createElement("div");
    container.className = "quick-replies-container";

    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "quick-reply-btn";
      btn.innerHTML = opt.text;
      btn.addEventListener("click", () => {
        sendMessage(opt.value);
      });
      container.appendChild(btn);
    });

    chatArea.appendChild(container);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "typing-indicator";
    div.innerHTML = "<span></span><span></span><span></span>";
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function showRoadmapCard(roadmapText) {
    const card = document.createElement("div");
    card.className = "roadmap-card";
    card.innerHTML = `<h3>📋 Your Personalized Roadmap</h3><pre>${escapeHtml(roadmapText)}</pre>`;
    chatArea.appendChild(card);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
